<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joshua Dean Church — Links</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.95rem;
      color: #999;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-group-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      margin-top: 12px;
      margin-bottom: -4px;
      padding-left: 2px;
    }

    .link-group-label:first-child {
      margin-top: 0;
    }

    a.link {
      display: block;
      padding: 16px 20px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      color: #f5f5f5;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 500;
      text-align: center;
      transition: background 0.2s, border-color 0.2s;
    }

    a.link:hover {
      background: #242424;
      border-color: #444;
    }

    a.link .sub {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: #888;
      margin-top: 3px;
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="font-size: 3rem; margin-bottom: 12px;">&#9889;</div>
      <h1>Joshua Dean Church</h1>
    </div>

    <div class="links">
      <div class="link-group-label">Cosmic Breadcrumbs</div>

      <a class="link" href="https://amzn.to/4sNQIHM" target="_blank" rel="noopener">
        Buy the Book on Amazon
      </a>

      <a class="link" href="https://amzn.to/4cIwxFo" target="_blank" rel="noopener">
        Download the Audiobook
        <span class="sub">Yes, I actually read it!</span>
      </a>

      <div class="link-group-label">Find the Others</div>

      <a class="link" href="https://www.joshuadeanchurch.com/find-the-others-podcast" target="_blank" rel="noopener">
        Listen to the Podcast
      </a>

      <a class="link" href="https://www.joshuadeanchurch.com/ftogroup" target="_blank" rel="noopener">
        Join the WhatsApp Group
      </a>

      <div class="link-group-label">Coastal Tribe</div>

      <a class="link" href="https://thecoastaltribe.com" target="_blank" rel="noopener">
        Sign Up for Events
      </a>

      <div class="link-group-label">Work Together</div>

      <a class="link" href="https://www.joshuadeanchurch.com/book-joshua-church" target="_blank" rel="noopener">
        See How I Can Help Your Business
      </a>
    </div>

    <div class="footer">&copy; Joshua Dean Church</div>
  </div>
</body>
</html>
